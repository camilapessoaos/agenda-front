<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10b981" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
  <title>Agenda Pet</title>
</head>
<body class="bg-light">
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="mb-2">📅 Agenda</h1>
      <p class="text-muted">Gerencie contatos e compromissos</p>
    </header>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Novo contato</h2>

        <form id="entry-form">
          <input type="hidden" id="entry-id" />

          <div class="mb-3">
            <label for="nome" class="form-label">Nome do contato *</label>
            <input type="text" id="nome" class="form-control" required placeholder="Ex: Dra. Ana Paula" />
          </div>

          <div class="mb-3">
            <label for="contato" class="form-label">Telefone/WhatsApp *</label>
            <input type="tel" id="contato" class="form-control" required placeholder="Ex: 11999999999" />
            <small class="text-muted">Apenas números, sem espaços ou caracteres especiais</small>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-success">Salvar contato</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar edição</button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0"></p>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h4 mb-0">📞 Meus contatos</h2>
          <button id="reload-btn" class="btn btn-outline-secondary">Atualizar</button>
        </div>

        <div id="entries-list"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
